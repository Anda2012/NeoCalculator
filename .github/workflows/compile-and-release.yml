name: Build and Release NumOS

on:
  push:
    branches:
      - main

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Current Date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Build NumOS (PlatformIO)
        run: pio run -e esp32s3_n16r8

      - name: Rename Firmware File
        # Renombramos el archivo para que el usuario descargue algo descriptivo
        run: cp .pio/build/esp32s3_n16r8/firmware.bin NumOS_v1.0-alpha_ESP32S3.bin

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Tag format: v1.0-alpha-2026-03-26-build5
          tag: "v1.0-alpha-${{ env.DATE }}-build${{ github.run_number }}"
          name: "NumOS v1.0-alpha [${{ env.DATE }}]"
          artifacts: "NumOS_v1.0-alpha_ESP32S3.bin"
          allowUpdates: true
          makeLatest: false # Alpha builds usually shouldn't be the "Latest" stable
          prerelease: true  # This adds the "Pre-release" orange label in GitHub
          body: |
            ## ⚠️ Alpha Release
            This version is an **automated alpha build** and is intended for testing purposes only. 
            Expect bugs and frequent updates. This is in current development and may not be stable (WIP).
            
            ### Installation
            1. Download the `NumOS_v1.0-alpha_ESP32S3.bin` file from the **Assets** section.
            2. Flash it to your **ESP32-S3** device.
            
            ### Build Details
            - **Status:** Alpha / WIP
            - **Date:** ${{ env.DATE }}
            - **Commit:** ${{ github.event.head_commit.message }}
            
            > [!IMPORTANT]
            > The "Source code" files below are automatically generated and are not required for flashing.