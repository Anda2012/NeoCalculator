name: Build and Release NumOS

on:
  push:
    branches:
      - main

jobs:
  build:
    # Advanced Filter
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'no build') && !contains(github.event.head_commit.message, '[no build]') && !contains(github.event.head_commit.message, '[SKIP CI]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Current Date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Patch platformio.ini for Ubuntu
        # Borra la línea de build_dir de Windows para evitar errores de ruta en Linux
        run: sed -i '/build_dir = C:\\/d' platformio.ini

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Build NumOS (PlatformIO)
        # Compila específicamente el entorno del ESP32-S3
        run: pio run -e esp32s3_n16r8

      - name: Rename Firmware File
        run: cp .pio/build/esp32s3_n16r8/firmware.bin NumOS_v1.0-alpha_ESP32S3.bin

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "v1.0-alpha-${{ env.DATE }}-build${{ github.run_number }}"
          name: "NumOS v1.0-alpha [${{ env.DATE }}]"
          artifacts: "NumOS_v1.0-alpha_ESP32S3.bin"
          allowUpdates: true
          makeLatest: false
          prerelease: true
          body: |
            ## ⚠️ Alpha Release
            This version is an **automated alpha build** (WIP).
            
            ### Installation
            1. Download `NumOS_v1.0-alpha_ESP32S3.bin` from the **Assets** section.
            2. Flash it to your **ESP32-S3** device.
            
            ### Build Details
            - **Status:** Alpha / Experimental
            - **Date:** ${{ env.DATE }}
            - **Commit:** ${{ github.event.head_commit.message }}
            
            > [!IMPORTANT]
            > The "Source code" files below are automatically generated and are not required for flashing.